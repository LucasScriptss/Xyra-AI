<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine KI Plattform</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
}

.container{
    width:80%;
    margin:auto;
}

textarea{
    width:100%;
    height:80px;
    border-radius:10px;
    padding:10px;
    border:none;
    font-size:16px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#00c6ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#0099cc;
}

#response{
    margin-top:20px;
    padding:15px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    min-height:50px;
}

/* Tabelle */
table{
    width:100%;
    margin-top:30px;
    border-collapse:collapse;
}

th, td{
    border:1px solid white;
    padding:10px;
}

th{
    background:#00c6ff;
    color:black;
}
</style>
</head>
<body>

<h1>🔥 Deine KI Plattform</h1>

<div class="container">

<textarea id="question" placeholder="Schreibe hier deine Frage..."></textarea>
<br>
<button onclick="askAI()">Senden</button>

<div id="response"></div>

<table>
<tr>
<th>Funktion</th>
<th>Status</th>
</tr>
<tr>
<td>Text Generierung</td>
<td>✔ Aktiv</td>
</tr>
<tr>
<td>Code Hilfe</td>
<td>✔ Aktiv</td>
</tr>
<tr>
<td>Bild Erstellung</td>
<td>✔ Optional</td>
</tr>
</table>

</div>

<script>
function askAI(){
    let q = document.getElementById("question").value;
    let output = document.getElementById("response");

    if(q.trim() === ""){
        output.innerHTML = "Bitte eine Frage eingeben.";
        return;
    }

    // Simulierte KI Antwort
    output.innerHTML = "🤖 KI Antwort auf:<br><b>" + q + "</b><br><br>Diese Plattform nutzt eine simulierte KI Logik.";
}
</script>

</body>
</html>
